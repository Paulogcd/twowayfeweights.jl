name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12.6'
          - 'pre'
          - 'nightly'
        R:
          - '4.5.1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      
      - uses: actions/checkout@v4
      
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.R }}

      - name: Debug R
        run: |
          R --version
          R RHOME
          find $(R RHOME) -name libR.so
      
      - name: Set LD_LIBRARY_PATH
        run: |
          echo "LD_LIBRARY_PATH=$(R RHOME)/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      
      - name: Rebuild RCall
        run: |
          using Pkg
          Pkg.build("RCall")
        shell: julia --project=. {0}

      - name: Install the original R package
        run: |

          install.packages("forcats", repos = "https://cloud.r-project.org")
          install.packages("readr", repos = "https://cloud.r-project.org")
          install.packages("vctrs", repos = "https://cloud.r-project.org")
          install.packages("glue", repos = "https://cloud.r-project.org")
          install.packages("pillar", repos = "https://cloud.r-project.org")
          install.packages("hms", repos = "https://cloud.r-project.org")
          install.packages("tidyselect", repos = "https://cloud.r-project.org")
          install.packages("tibble", repos = "https://cloud.r-project.org")
          install.packages("haven", repos = "https://cloud.r-project.org")
    
          install.packages("TwoWayFEWeights", repos = "https://cloud.r-project.org")

        shell: Rscript {0}

      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
